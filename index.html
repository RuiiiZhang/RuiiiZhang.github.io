<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>瑞的专属入口</title>
</head>
<body>
    <h1>请输入正确口令进入</h1>
    <input type="text" id="passcode" placeholder="请输入 www.rui.com">
    <button onclick="verify()">进入</button>

    <script>
        function verify() {
            let input = document.getElementById("passcode").value;
            if (input === "www.rui.com") {
                alert("验证成功，欢迎进入！");
                document.body.innerHTML = `
                    <h1>🎉 你成功进入了瑞的专属页面！</h1>
                    <p>这是你亲手制作的网页哦。</p>
                `;
            } else {
                alert("口令错误，请输入：www.rui.com");
            }
        }
    </script>
</body>
</html>
